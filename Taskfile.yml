version: "3"

tasks:
  build:
    desc: Build Go binary
    cmds:
      - go build -o build/exacli ./cmd/exacli

  clean:
    desc: Remove build artifacts
    cmd: rm -rf build/ dist/

  lint:
    desc: Lint Go code
    cmds:
      - go vet ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...

  check:
    desc: Run lint and tests
    cmds:
      - task: lint
      - task: test

  compile:
    desc: Compile optimized binary for current platform
    cmds:
      - mkdir -p dist
      - CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/exacli ./cmd/exacli

  compile:all:
    desc: Compile for all platforms
    cmds:
      - |
        mkdir -p dist
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/exacli-linux-x64 ./cmd/exacli
        CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/exacli-linux-arm64 ./cmd/exacli
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -extldflags=-static" -o dist/exacli-linux-x64-musl ./cmd/exacli
        CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w -extldflags=-static" -o dist/exacli-linux-arm64-musl ./cmd/exacli
        CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/exacli-darwin-x64 ./cmd/exacli
        CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/exacli-darwin-arm64 ./cmd/exacli
        CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/exacli-windows-x64.exe ./cmd/exacli
        CGO_ENABLED=0 GOOS=windows GOARCH=arm64 go build -ldflags="-s -w" -o dist/exacli-windows-arm64.exe ./cmd/exacli

  compile:native:
    desc: Compile for the current platform with platform-suffixed output
    cmds:
      - |
        mkdir -p dist
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64) ARCH="x64" ;;
          aarch64|arm64) ARCH="arm64" ;;
        esac
        CGO_ENABLED=0 go build -ldflags="-s -w" -o "dist/exacli-${OS}-${ARCH}" ./cmd/exacli
        echo "Built: dist/exacli-${OS}-${ARCH}"

  ci:
    desc: Run full CI pipeline locally
    cmds:
      - task: clean
      - task: check
      - task: build
