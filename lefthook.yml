pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.go"
      run: |
        unformatted=$(gofmt -l {staged_files})
        if [ -n "$unformatted" ]; then
          echo "Run gofmt on these files before committing:"
          echo "$unformatted"
          exit 1
        fi
    vet:
      glob: "*.go"
      run: go vet ./...

pre-push:
  commands:
    test:
      run: go test ./...
